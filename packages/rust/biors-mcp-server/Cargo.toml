[package]
name = "biors-mcp-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Model Context Protocol server for bio-rs biological sequence processing tools."

[dependencies]
biors-core = { workspace = true }
rmcp = { version = "1.7", features = ["server", "transport-io", "macros"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "io-util"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
jsonschema = "0.18.3"
rmcp = { version = "1.7", features = ["client", "transport-child-process"] }

[[bench]]
name = "mcp_request_overhead"
harness = false
