[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "biors"
version = "0.1.0"
description = "Rust-backed tools for biological AI models."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT OR Apache-2.0"}
keywords = ["bioinformatics", "protein", "tokenizer", "rust"]
authors = [
  {name = "bio-rs contributors"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
"Homepage" = "https://github.com/bio-rs/bio-rs"
"Bug Tracker" = "https://github.com/bio-rs/bio-rs/issues"
