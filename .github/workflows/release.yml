name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-readiness:
    name: Release Readiness Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Run checks
        run: scripts/check.sh

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-readiness
    steps:
      - uses: actions/checkout@v6
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Dry-run publish biors-core
        run: cargo publish --locked -p biors-core --dry-run
      - name: Publish biors-core
        run: cargo publish --locked -p biors-core --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for biors-core index
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "biors-core"))')"

          for attempt in $(seq 1 30); do
            if cargo search biors-core --limit 1 | grep -q "biors-core = \"$version\""; then
              exit 0
            fi
            echo "biors-core $version not visible in crates index yet; attempt $attempt/30"
            sleep 10
          done

          echo "biors-core $version did not appear in crates index in time" >&2
          exit 1
      - name: Dry-run publish biors
        run: cargo publish --locked -p biors --dry-run
      - name: Publish biors
        run: cargo publish --locked -p biors --token ${{ secrets.CRATES_IO_TOKEN }}

  build-release-binaries:
    name: Build Release Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-readiness
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: biors-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: biors-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --locked --release -p biors --target "${{ matrix.target }}"
      - name: Package release binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/biors" dist/biors
          tar -C dist -czf "${{ matrix.archive }}" biors
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - publish-crates
      - build-release-binaries
    steps:
      - uses: actions/checkout@v6
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists for $TAG_NAME"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "bio-rs ${TAG_NAME#v}" \
            --generate-notes \
            dist/*.tar.gz
