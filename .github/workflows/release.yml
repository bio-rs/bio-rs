name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  BIORS_RELEASE_MATURIN_VERSION: '1.13.3'
  BIORS_RELEASE_WASM_PACK_VERSION: '0.15.0'
  BIORS_RELEASE_WASM_PACK_SHA256: 'c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a'
  BIORS_RELEASE_NODE_VERSION: '24.16.0'

jobs:
  release-readiness:
    name: Release Readiness Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: Run dependency security audit
        run: scripts/check-security-audit.sh
      - name: Run checks
        run: scripts/check.sh

  pre-tag-registry-check:
    name: Pre-tag Registry Check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-readiness
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.BIORS_RELEASE_NODE_VERSION }}
          package-manager-cache: false
      - name: Check package versions are unpublished
        run: scripts/check-registry-versions.py

  package-artifact-checks:
    name: Package Artifact Checks
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.BIORS_RELEASE_NODE_VERSION }}
          package-manager-cache: false
      - name: Install maturin
        run: python -m pip install --upgrade "maturin==${{ env.BIORS_RELEASE_MATURIN_VERSION }}"
      - name: Install wasm-pack
        run: |
          archive="wasm-pack-v${{ env.BIORS_RELEASE_WASM_PACK_VERSION }}-x86_64-unknown-linux-musl"
          curl -fsSL "https://github.com/rustwasm/wasm-pack/releases/download/v${{ env.BIORS_RELEASE_WASM_PACK_VERSION }}/${archive}.tar.gz" -o wasm-pack.tar.gz
          printf '%s  wasm-pack.tar.gz\n' "${{ env.BIORS_RELEASE_WASM_PACK_SHA256 }}" | sha256sum -c -
          tar -xzf wasm-pack.tar.gz
          echo "$PWD/${archive}" >> "$GITHUB_PATH"
      - name: Run package artifact checks
        run: scripts/check-package-artifacts.sh

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
      - package-artifact-checks
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c
      - name: Cache Cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Dry-run publish biors-core
        run: cargo publish --locked -p biors-core --dry-run
      - name: Publish biors-core
        run: cargo publish --locked -p biors-core --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for biors-core index
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "biors-core"))')"
          crate="biors-core"

          python3 - "$crate" "$version" <<'PY'
          import sys
          import time
          import urllib.error
          import urllib.request

          crate, version = sys.argv[1:]
          url = f"https://crates.io/api/v1/crates/{crate}/{version}"
          for attempt in range(1, 91):
              try:
                  with urllib.request.urlopen(url, timeout=20) as response:
                      if response.status == 200:
                          sys.exit(0)
              except urllib.error.HTTPError as error:
                  if error.code != 404:
                      print(f"{crate} {version} registry check returned HTTP {error.code}; attempt {attempt}/90")
                  else:
                      print(f"{crate} {version} not visible in crates registry yet; attempt {attempt}/90")
              except urllib.error.URLError as error:
                  print(f"{crate} {version} registry check failed: {error.reason}; attempt {attempt}/90")
              time.sleep(10)

          print(f"{crate} {version} did not appear in crates registry in time", file=sys.stderr)
          sys.exit(1)
          PY
      - name: Dry-run publish biors-mcp-server
        run: cargo publish --locked -p biors-mcp-server --dry-run
      - name: Publish biors-mcp-server
        run: cargo publish --locked -p biors-mcp-server --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Dry-run publish biors-backend-candle
        run: cargo publish --locked -p biors-backend-candle --dry-run
      - name: Publish biors-backend-candle
        run: cargo publish --locked -p biors-backend-candle --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for biors-backend-candle index
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "biors-backend-candle"))')"
          crate="biors-backend-candle"

          python3 - "$crate" "$version" <<'PY'
          import sys
          import time
          import urllib.error
          import urllib.request

          crate, version = sys.argv[1:]
          url = f"https://crates.io/api/v1/crates/{crate}/{version}"
          for attempt in range(1, 91):
              try:
                  with urllib.request.urlopen(url, timeout=20) as response:
                      if response.status == 200:
                          sys.exit(0)
              except urllib.error.HTTPError as error:
                  if error.code != 404:
                      print(f"{crate} {version} registry check returned HTTP {error.code}; attempt {attempt}/90")
                  else:
                      print(f"{crate} {version} not visible in crates registry yet; attempt {attempt}/90")
              except urllib.error.URLError as error:
                  print(f"{crate} {version} registry check failed: {error.reason}; attempt {attempt}/90")
              time.sleep(10)

          print(f"{crate} {version} did not appear in crates registry in time", file=sys.stderr)
          sys.exit(1)
          PY
      - name: Dry-run publish biors
        run: cargo publish --locked -p biors --dry-run
      - name: Publish biors
        run: cargo publish --locked -p biors --token ${{ secrets.CRATES_IO_TOKEN }}

  build-python-wheels:
    name: Build Python Wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
      - package-artifact-checks
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      RUSTUP_TOOLCHAIN: 1.88.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      - name: Install maturin
        run: python -m pip install --upgrade "maturin==${{ env.BIORS_RELEASE_MATURIN_VERSION }}"
      - name: Build wheel
        run: maturin build --release --manifest-path crates/biors-python/Cargo.toml --out dist --compatibility pypi
      - name: Build source distribution
        if: runner.os == 'Linux'
        run: maturin sdist --manifest-path crates/biors-python/Cargo.toml --out dist
      - name: Check Python distribution license files
        run: python scripts/check-release-artifact-contents.py python-dist dist
      - name: Check Python source distribution license files
        if: runner.os == 'Linux'
        run: python scripts/check-release-artifact-contents.py python-dist dist --require-sdist
      - name: Test installed Python wheel
        run: python scripts/test-python-wheel.py --dist-dir dist
      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-dist-${{ matrix.os }}
          path: dist/*

  publish-python:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
      - package-artifact-checks
      - build-python-wheels
    permissions:
      contents: read
      id-token: write
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true
      - name: Publish Python distributions to PyPI with token
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          password: ${{ env.PYPI_API_TOKEN }}
      - name: Publish Python distributions to PyPI with trusted publishing
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

  publish-wasm-npm:
    name: Publish WASM Package to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
      - package-artifact-checks
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c
        with:
          targets: wasm32-unknown-unknown
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.BIORS_RELEASE_NODE_VERSION }}
          package-manager-cache: false
      - name: Install wasm-pack
        run: |
          archive="wasm-pack-v${{ env.BIORS_RELEASE_WASM_PACK_VERSION }}-x86_64-unknown-linux-musl"
          curl -fsSL "https://github.com/rustwasm/wasm-pack/releases/download/v${{ env.BIORS_RELEASE_WASM_PACK_VERSION }}/${archive}.tar.gz" -o wasm-pack.tar.gz
          printf '%s  wasm-pack.tar.gz\n' "${{ env.BIORS_RELEASE_WASM_PACK_SHA256 }}" | sha256sum -c -
          tar -xzf wasm-pack.tar.gz
          echo "$PWD/${archive}" >> "$GITHUB_PATH"
      - name: Test WASM package
        run: wasm-pack test --node crates/biors-wasm
      - name: Build npm package
        run: scripts/build-wasm-npm-package.sh
      - name: Check npm package artifact contents
        run: python scripts/check-release-artifact-contents.py wasm-package crates/biors-wasm/pkg
      - name: Publish npm package with trusted publishing
        run: npm publish crates/biors-wasm/pkg --access public --provenance

  build-release-binaries:
    name: Build Release Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
      - package-artifact-checks
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: biors-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: biors-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c
        with:
          targets: ${{ matrix.target }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Build release binary
        run: cargo build --locked --release -p biors --target "${{ matrix.target }}"
      - name: Package release binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/biors" dist/biors
          cp README.md LICENSE-APACHE LICENSE-MIT dist/
          tar -C dist -czf "${{ matrix.archive }}" biors README.md LICENSE-APACHE LICENSE-MIT
      - name: Check binary archive contents
        run: python scripts/check-release-artifact-contents.py binary-tarball "${{ matrix.archive }}"
      - name: Write binary archive checksum
        run: python scripts/write-release-checksums.py "${{ matrix.archive }}"
      - name: Verify binary archive checksum
        run: python scripts/write-release-checksums.py --verify "${{ matrix.archive }}"
      - name: Generate binary archive provenance attestation
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - publish-crates
      - publish-python
      - publish-wasm-npm
      - build-release-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist
          merge-multiple: true
      - name: Verify binary archive checksums
        run: python scripts/write-release-checksums.py --verify dist/biors-v*.tar.gz
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists for $TAG_NAME"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "bio-rs ${TAG_NAME#v}" \
            --generate-notes \
            dist/biors-v*.tar.gz \
            dist/biors-v*.tar.gz.sha256
