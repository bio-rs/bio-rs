name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-readiness:
    name: Release Readiness Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Run checks
        run: scripts/check.sh

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-readiness
    steps:
      - uses: actions/checkout@v6
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Dry-run publish biors-core
        run: cargo publish --locked -p biors-core --dry-run
      - name: Dry-run publish biors
        run: cargo publish --locked -p biors --dry-run
      - name: Publish biors-core
        run: cargo publish --locked -p biors-core --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for biors-core index
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "biors-core"))')"

          for attempt in $(seq 1 30); do
            if cargo search biors-core --limit 1 | grep -q "biors-core = \"$version\""; then
              exit 0
            fi
            echo "biors-core $version not visible in crates index yet; attempt $attempt/30"
            sleep 10
          done

          echo "biors-core $version did not appear in crates index in time" >&2
          exit 1
      - name: Publish biors
        run: cargo publish --locked -p biors --token ${{ secrets.CRATES_IO_TOKEN }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-crates
    steps:
      - uses: actions/checkout@v6
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists for $TAG_NAME"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "bio-rs ${TAG_NAME#v}" \
            --generate-notes
