name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run checks
        run: scripts/check.sh
      - name: Publish biors-core
        run: cargo publish -p biors-core --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Publish biors
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo publish -p biors --token ${{ secrets.CRATES_IO_TOKEN }}; then
              exit 0
            fi
            echo "biors-core is not visible in the crates.io index yet; retry ${attempt}/5"
            sleep 30
          done
          exit 1
