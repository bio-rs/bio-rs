name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-readiness:
    name: Release Readiness Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: Run dependency security audit
        run: scripts/check-security-audit.sh
      - name: Run checks
        run: scripts/check.sh

  pre-tag-registry-check:
    name: Pre-tag Registry Check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-readiness
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Check package versions are unpublished
        run: scripts/check-registry-versions.py

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Dry-run publish biors-core
        run: cargo publish --locked -p biors-core --dry-run
      - name: Publish biors-core
        run: cargo publish --locked -p biors-core --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for biors-core index
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "biors-core"))')"

          for attempt in $(seq 1 30); do
            if cargo search biors-core --limit 1 | grep -q "biors-core = \"$version\""; then
              exit 0
            fi
            echo "biors-core $version not visible in crates index yet; attempt $attempt/30"
            sleep 10
          done

          echo "biors-core $version did not appear in crates index in time" >&2
          exit 1
      - name: Dry-run publish biors-mcp-server
        run: cargo publish --locked -p biors-mcp-server --dry-run
      - name: Publish biors-mcp-server
        run: cargo publish --locked -p biors-mcp-server --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Dry-run publish biors-backend-candle
        run: cargo publish --locked -p biors-backend-candle --dry-run
      - name: Publish biors-backend-candle
        run: cargo publish --locked -p biors-backend-candle --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Wait for biors-backend-candle index
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "biors-backend-candle"))')"

          for attempt in $(seq 1 30); do
            if cargo search biors-backend-candle --limit 1 | grep -q "biors-backend-candle = \"$version\""; then
              exit 0
            fi
            echo "biors-backend-candle $version not visible in crates index yet; attempt $attempt/30"
            sleep 10
          done

          echo "biors-backend-candle $version did not appear in crates index in time" >&2
          exit 1
      - name: Dry-run publish biors
        run: cargo publish --locked -p biors --dry-run
      - name: Publish biors
        run: cargo publish --locked -p biors --token ${{ secrets.CRATES_IO_TOKEN }}

  build-python-wheels:
    name: Build Python Wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install maturin
        run: python -m pip install --upgrade maturin
      - name: Build wheel
        run: maturin build --release --manifest-path packages/rust/biors-python/Cargo.toml --out dist --compatibility pypi
      - name: Build source distribution
        if: runner.os == 'Linux'
        run: maturin sdist --manifest-path packages/rust/biors-python/Cargo.toml --out dist
      - name: Check Python distribution license files
        run: python scripts/check-release-artifact-contents.py python-dist dist
      - name: Check Python source distribution license files
        if: runner.os == 'Linux'
        run: python scripts/check-release-artifact-contents.py python-dist dist --require-sdist
      - name: Test installed Python wheel
        run: python scripts/test-python-wheel.py --dist-dir dist
      - name: Upload Python distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-dist-${{ matrix.os }}
          path: dist/*

  publish-python:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
      - build-python-wheels
    permissions:
      contents: read
      id-token: write
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v8
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true
      - name: Publish Python distributions to PyPI with token
        if: env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}
      - name: Publish Python distributions to PyPI with trusted publishing
        if: env.PYPI_API_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-wasm-npm:
    name: Publish WASM Package to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Test WASM package
        run: wasm-pack test --node packages/rust/biors-wasm
      - name: Build npm package
        run: scripts/build-wasm-npm-package.sh
      - name: Check npm package artifact contents
        run: python scripts/check-release-artifact-contents.py wasm-package packages/rust/biors-wasm/pkg
      - name: Publish npm package with trusted publishing
        run: npm publish packages/rust/biors-wasm/pkg --access public

  build-release-binaries:
    name: Build Release Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-readiness
      - pre-tag-registry-check
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: biors-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: biors-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --locked --release -p biors --target "${{ matrix.target }}"
      - name: Package release binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/biors" dist/biors
          cp README.md LICENSE-APACHE LICENSE-MIT dist/
          tar -C dist -czf "${{ matrix.archive }}" biors README.md LICENSE-APACHE LICENSE-MIT
      - name: Check binary archive contents
        run: python scripts/check-release-artifact-contents.py binary-tarball "${{ matrix.archive }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - publish-crates
      - publish-python
      - publish-wasm-npm
      - build-release-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists for $TAG_NAME"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "bio-rs ${TAG_NAME#v}" \
            --generate-notes \
            dist/*.tar.gz
