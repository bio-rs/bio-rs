name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-readiness:
    name: Release Readiness Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Run checks
        run: scripts/check.sh

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-readiness
    steps:
      - uses: actions/checkout@v6
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Publish biors-core
        run: cargo publish --locked -p biors-core --token ${{ secrets.CRATES_IO_TOKEN }}
      - name: Publish biors
        run: cargo publish --locked -p biors --token ${{ secrets.CRATES_IO_TOKEN }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-crates
    steps:
      - uses: actions/checkout@v6
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists for $TAG_NAME"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "bio-rs ${TAG_NAME#v}" \
            --generate-notes
