<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bio-rs browser validation/tokenization</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>bio-rs browser validation/tokenization</h1>
      <label>
        File
        <input id="file" type="file" />
      </label>
      <label>
        Format
        <select id="format">
          <option value="">Infer</option>
          <option value="fasta">FASTA</option>
          <option value="fastq">FASTQ</option>
          <option value="pdb">PDB</option>
          <option value="smiles">SMILES</option>
        </select>
      </label>
      <label>
        Kind
        <select id="kind">
          <option value="auto">Auto</option>
          <option value="protein">Protein</option>
          <option value="dna">DNA</option>
          <option value="rna">RNA</option>
        </select>
      </label>
      <label>
        Profile
        <select id="profile">
          <option value="protein-20">Protein 20</option>
          <option value="protein-20-special">Protein 20 special</option>
          <option value="dna-iupac">DNA IUPAC</option>
          <option value="rna-iupac">RNA IUPAC</option>
        </select>
      </label>
      <div class="actions">
        <button id="validate" type="button">Validate</button>
        <button id="tokenize" type="button">Tokenize FASTA</button>
      </div>
      <pre id="output" aria-live="polite"></pre>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
